{% extends 'base.html' %}

{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12 mb-4 mt-1">
                <div class="d-flex flex-wrap justify-content-between align-items-center">
                    <h4 class="font-weight-bold">登录微博账户</h4>

                </div>
            </div>
            <div class="col-lg-8 col-md-14">
                <div class="row">
                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex align-items-center">
                                    <div class="">
                                        <p class="mb-2 text-secondary">请登录微博账户</p>
                                        <div class="d-flex flex-wrap justify-content-start align-items-center">
                                            <button type="button"
                                                    class="btn btn-primary mt-2"
                                                    style="margin-left: 100px;"
                                                    onclick="executeSelenium()">登录微博</button>

                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center flex-wrap">
                                    <h4 class="font-weight-bold">根据关键词爬取</h4>

                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-6 col-md-6 col-lg-6">
                                    <div class="input-group">
                                        <input type="text"
                                               class="form-control"
                                               id="keywordInput"
                                               placeholder="请输入关键词"
                                               aria-label="关键词">
                                        <div class="input-group-append">
                                            <button class="btn btn-primary"
                                                    type="button"
                                                    id="confirmBtn1"
                                                    onclick="getKeywordAndSubmit()">
                                                <i class="fas fa-search mr-1"></i>确认
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-12">
                        <div class="card">
                            <div class="card-body">
                                <div class="d-flex justify-content-between align-items-center flex-wrap">
                                    <h4 class="font-weight-bold">根据微博热词爬取</h4>

                                </div>
                            </div>
                            <div class="row mb-4">
                                <div class="col-12 col-md-6 col-lg-6">
                                    <div class="text-right">

                                            <button class="btn btn-primary"
                                                    type="button"
                                                    id="confirmBtn2"
                                                    onclick="getHotWordAndSubmit()">
                                                <i class="fas fa-search mr-1"></i>热词爬取
                                            </button>

                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>


<script>
async function executeSelenium() {
  try {
    // 调用后端执行接口
    const response = await fetch('/page/weiboLogin', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'}
    });
    const result = await response.json();
    // 更新页面显示
    document.getElementById('totalArticle').textContent =
      result.status === 'success' ? result.output : '执行失败';
  } catch (error) {
    console.error('执行异常:', error);
    document.getElementById('totalArticle').textContent = '网络请求失败';
  }
}
</script>

<script>
async function getHotWordAndSubmit() {
const btn = document.getElementById('confirmBtn2');
    const originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 执行中...';
try {
        await fetch('/page/hotSpider', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });

        console.log("程序执行完毕");
    } catch (error) {
        console.error("请求失败", error);
        alert("执行过程中发生网络错误");
    } finally {
        // 恢复按钮
        btn.disabled = false;
        btn.innerHTML = originalHtml;
    }
}
</script>



<script>

    function getKeywordAndSubmit() {
        // 获取输入框的值并去除前后空格
        var keyword = $('#keywordInput').val().trim();

        // 检查是否为空
        if (keyword === '') {
            alert('请输入关键词');
            $('#keywordInput').focus(); // 让输入框获得焦点
            return;
        }
        console.log('获取到的关键词:', keyword);
        // 显示正在爬取
        $('#confirmBtn').html('<i class="fas fa-spinner fa-spin mr-1"></i>爬取中...').prop('disabled', true);
        // 发送到后端
        $.ajax({
            url: '/page/crawl',  //后端接口
            type: 'POST',
            contentType: 'application/json',
            data: JSON.stringify({
                keyword: keyword,
                timestamp: new Date().getTime() // 添加时间戳
            }),
            dataType: 'json',
            success: function (response) {
                console.log('后端返回:', response);
                // 恢复按钮状态
                $('#confirmBtn').html('<i class="fas fa-search mr-1"></i>确认').prop('disabled', false);

                // 显示成功提示
                showMessage('success', '关键词"' + keyword + '"已提交成功');
            },
            error: function (xhr, status, error) {
                console.error('请求失败:', error);
                // 恢复按钮状态
                $('#confirmBtn').html('<i class="fas fa-search mr-1"></i>确认').prop('disabled', false);
                // 显示错误提示
                showMessage('danger', '提交失败，请稍后重试');
            }

        });
    }

</script>
{% endblock %}
