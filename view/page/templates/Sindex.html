{% extends 'base.html' %}
{% block title %}登录微博账户{% endblock %}
{% block content %}
    <div class="container-fluid">
        <div class="row">
            <div class="col-md-12 mb-4 mt-1">
                <div class="d-flex flex-wrap justify-content-between align-items-center">
                    <h4 class="font-weight-bold">登录微博账户</h4>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-12 col-md-12 mb-4">
                <div class="card card-block card-stretch card-height">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">微博账户登录</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="mb-3 text-secondary">请登录微博账户，登录成功后方可进行数据爬取</p>
                        <button type="button"
                                class="btn btn-primary"
                                id="loginBtn"
                                onclick="executeSelenium()">
                            <i class="fas fa-sign-in-alt mr-1"></i>登录微博
                        </button>
                        <p class="mb-0 mt-3 text-secondary small" id="totalArticle"></p>
                    </div>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-lg-6 col-md-12 mb-4">
                <div class="card card-block card-stretch card-height">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">根据关键词爬取</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="mb-3 text-secondary">输入关键词，爬取相关微博数据</p>
                        <div class="input-group">
                            <input type="text"
                                   class="form-control"
                                   id="keywordInput"
                                   placeholder="请输入关键词"
                                   aria-label="关键词">
                            <div class="input-group-append">
                                <button class="btn btn-primary"
                                        type="button"
                                        id="confirmBtn1"
                                        onclick="getKeywordAndSubmit()">
                                    <i class="fas fa-search mr-1"></i>确认
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-6 col-md-12 mb-4">
                <div class="card card-block card-stretch card-height">
                    <div class="card-header d-flex justify-content-between">
                        <div class="header-title">
                            <h4 class="card-title">根据微博热词爬取</h4>
                        </div>
                    </div>
                    <div class="card-body">
                        <p class="mb-3 text-secondary">自动获取当前微博热词并进行数据爬取</p>
                        <button class="btn btn-primary"
                                type="button"
                                id="confirmBtn2"
                                onclick="getHotWordAndSubmit()">
                            <i class="fas fa-fire mr-1"></i>热词爬取
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>
{% endblock %}
{% block echarts %}
<script>
async function executeSelenium() {
    const btn = document.getElementById('loginBtn');
    const statusEl = document.getElementById('totalArticle');
    const originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>登录中...';
    statusEl.textContent = '';
    try {
        const response = await fetch('/page/weiboLogin', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        const result = await response.json();
        statusEl.textContent =
            result.status === 'success' ? result.output : '执行失败';
    } catch (error) {
        console.error('执行异常:', error);
        statusEl.textContent = '网络请求失败';
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
    }
}

async function getHotWordAndSubmit() {
    const btn = document.getElementById('confirmBtn2');
    const originalHtml = btn.innerHTML;
    btn.disabled = true;
    btn.innerHTML = '<i class="fas fa-spinner fa-spin mr-1"></i>执行中...';
    try {
        await fetch('/page/hotSpider', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'}
        });
        console.log("程序执行完毕");
    } catch (error) {
        console.error("请求失败", error);
        alert("执行过程中发生网络错误");
    } finally {
        btn.disabled = false;
        btn.innerHTML = originalHtml;
    }
}

function getKeywordAndSubmit() {
    var keyword = $('#keywordInput').val().trim();
    if (keyword === '') {
        alert('请输入关键词');
        $('#keywordInput').focus();
        return;
    }
    console.log('获取到的关键词:', keyword);
    $('#confirmBtn1').html('<i class="fas fa-spinner fa-spin mr-1"></i>爬取中...').prop('disabled', true);
    $.ajax({
        url: '/page/crawl',
        type: 'POST',
        contentType: 'application/json',
        data: JSON.stringify({
            keyword: keyword,
            timestamp: new Date().getTime()
        }),
        dataType: 'json',
        success: function (response) {
            console.log('后端返回:', response);
            $('#confirmBtn1').html('<i class="fas fa-search mr-1"></i>确认').prop('disabled', false);
            showMessage('success', '关键词"' + keyword + '"已提交成功');
        },
        error: function (xhr, status, error) {
            console.error('请求失败:', error);
            $('#confirmBtn1').html('<i class="fas fa-search mr-1"></i>确认').prop('disabled', false);
            showMessage('danger', '提交失败，请稍后重试');
        }
    });
}
</script>
{% endblock %}
